<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Гуляяять</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #333;
            padding: 20px;
        }
        
        .page {
            width: 100%;
            max-width: 1900px;
            text-align: center;
        }
        
        .auth-box {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .form-box {
            background: transparent;
            padding: 0;
            border-radius: 20px;
            box-shadow: none;
        }
        
        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }
        
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .hidden { display: none; }
        
        .city-bg {
            background-image: url('фон.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #1a1a2e;
            border-radius: 20px;
            width: 100%;
            min-height: 170vh;
            position: relative;
        }
        
        /* ЖЁСТКАЯ ФИКСАЦИЯ ПОЛЕЙ - ОНИ НЕ ДВИГАЮТСЯ */
        .top-row {
            position: absolute;
            top: 12%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 250px;
            flex-wrap: nowrap;
        }
        
        .bottom-row {
            position: absolute;
            bottom: 15%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 250px;
            flex-wrap: nowrap;
        }
        
        .field-group {
            text-align: left;
            width: 250px;
            flex-shrink: 0;
        }
        
        .field-group input {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: rgba(255,255,255,0.95);
            padding: 14px 10px;
            font-size: 16px;
            text-align: center;
        }
        
        .save-bottom {
            position: absolute;
            bottom: 5%;
            left: 0;
            right: 0;
            text-align: center;
        }
        
        .save-bottom button {
            background: #28a745;
            font-size: 20px;
            padding: 16px 50px;
        }
        
        /* ДЛЯ ТЕЛЕФОНОВ - МЕНЬШЕ ОТСТУПЫ И ПОЛЯ */
        @media (max-width: 1200px) {
            .top-row { gap: 150px; top: 10%; }
            .bottom-row { gap: 150px; bottom: 12%; }
            .field-group { width: 200px; }
        }
        
        @media (max-width: 900px) {
            .top-row { gap: 80px; top: 8%; }
            .bottom-row { gap: 80px; bottom: 10%; }
            .field-group { width: 170px; }
            .field-group input { padding: 10px 8px; font-size: 14px; }
        }
        
        @media (max-width: 700px) {
            .top-row { gap: 40px; top: 5%; }
            .bottom-row { gap: 40px; bottom: 8%; }
            .field-group { width: 140px; }
            .field-group input { padding: 8px 5px; font-size: 12px; }
        }
        
        @media (max-width: 550px) {
            .top-row { gap: 20px; top: 3%; }
            .bottom-row { gap: 20px; bottom: 5%; }
            .field-group { width: 110px; }
            .field-group input { padding: 6px 4px; font-size: 10px; }
        }
    </style>
</head>
<body>
<div class="page">
    
    <div id="step1" class="auth-box">
        <h2>Ваше имя</h2>
        <input type="text" id="userName" placeholder="Имя">
        <button onclick="enter()">Далее</button>
    </div>

    <div id="step2" class="form-box hidden">
        <div class="city-bg">
            
            <div class="top-row">
                <div class="field-group">
                    <input type="text" id="field1" placeholder="Имя">
                </div>
                <div class="field-group">
                    <input type="text" id="field2" placeholder="Имя">
                </div>
                <div class="field-group">
                    <input type="text" id="field3" placeholder="Имя">
                </div>
            </div>
            
            <div class="bottom-row">
                <div class="field-group">
                    <input type="text" id="field4" placeholder="Имя">
                </div>
                <div class="field-group">
                    <input type="text" id="field5" placeholder="Имя">
                </div>
                <div class="field-group">
                    <input type="text" id="field6" placeholder="Имя">
                </div>
            </div>
            
            <div class="save-bottom">
                <button onclick="saveText()">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<script>
    function enter() {
        let name = document.getElementById('userName').value.trim();
        if (name === '') { 
            alert('Введите ваше имя'); 
            return; 
        }
        localStorage.setItem('userName', name);
        
        for (let i = 1; i <= 6; i++) {
            let saved = localStorage.getItem('friends_' + name + '_field' + i);
            if (saved) {
                document.getElementById('field' + i).value = saved;
            } else {
                document.getElementById('field' + i).value = '';
            }
        }
        
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    }
    
    function saveText() {
        let name = localStorage.getItem('userName');
        if (!name) {
            alert('Ошибка');
            return;
        }
        for (let i = 1; i <= 6; i++) {
            let text = document.getElementById('field' + i).value;
            localStorage.setItem('friends_' + name + '_field' + i, text);
        }
        alert('Сохранено!');
    }
    
    let oldName = localStorage.getItem('userName');
    if (oldName && oldName !== '') {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        for (let i = 1; i <= 6; i++) {
            let saved = localStorage.getItem('friends_' + oldName + '_field' + i);
            if (saved) {
                document.getElementById('field' + i).value = saved;
            }
        }
    }
</script>
</body>
</html>
